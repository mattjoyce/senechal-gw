name: test

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  fast-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: binary
          args: --version

      - name: Run fast tests
        run: ./scripts/test-fast

      - name: Run lint
        run: golangci-lint run ./...

  docker-validation:
    runs-on: ubuntu-latest
    needs: fast-validation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install jq and sqlite3
        run: sudo apt-get update && sudo apt-get install -y jq sqlite3

      - name: Build ductile binary
        run: make build

      - name: Run Docker-backed staged tests
        run: |
          ./scripts/test-docker api-e2e
          ./scripts/test-docker scheduler-recovery
          ./scripts/test-docker webhook-ingress

      - name: Upload Docker test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-test-artifacts
          path: test-artifacts/docker
          if-no-files-found: ignore
