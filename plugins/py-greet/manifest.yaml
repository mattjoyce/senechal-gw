manifest_spec: ductile.plugin
manifest_version: 1
name: py-greet
version: 0.1.0
protocol: 2
entrypoint: run.py
description: "Python example plugin - greets the user with a configurable message"
commands:
  - name: poll
    type: read
    description: "Returns a greeting heartbeat and updates last-run state."
    values:
      consume: []
      emit: []
  - name: health
    type: read
    description: "Returns plugin health and version information."
fact_outputs:
  - when:
      command: poll
    from: state_updates
    fact_type: py-greet.snapshot
    compatibility_view: mirror_object
config_keys:
  required: []
  optional: [greeting, name]
