manifest_spec: ductile.plugin
manifest_version: 1
name: echo
version: 0.1.0
protocol: 2
entrypoint: run.sh
description: "A demonstration plugin that returns a configured echo response."
commands:
  - name: handle
    type: write
    description: "Returns a configured echo response."
    values:
      consume: []
      emit: []
  - name: poll
    type: write
    description: "Returns a configured echo response on a schedule."
    idempotent: false
    retry_safe: false
    input_schema:
      message: string
    output_schema:
      status: string
    values:
      consume: []
      emit: []
  - name: health
    type: read
    description: "Returns the current health status and plugin version."
    idempotent: true
    retry_safe: true
config_keys:
  required: []
  optional: [message, mode]
