# COPY CHECKLIST:
# 1) Copy this folder to a new plugin directory (e.g. plugins/astro_refresh/).
# 2) Change `name:` below so it is unique across all plugin roots.
# 3) Keep `entrypoint: run.py` unless you intentionally swap runtimes.
# 4) Configure `plugins.<your_name>.config.command` in config.yaml.
# 5) Optionally set `event_type` per clone to avoid route ambiguity.
manifest_spec: ductile.plugin
manifest_version: 1
name: astro_rebuild_staging
version: 0.1.0
protocol: 2
entrypoint: run.py
description: "Rebuild and restart the local Astro staging site via docker compose."
commands:
  - name: handle
    type: write
    description: "Rebuild and restart the local Astro staging site via Docker Compose. No payload required."
  - name: health
    type: read
    description: "Validate command and runtime prerequisites."
config_keys:
  required: [command]
  optional:
    - event_type
    - timeout_seconds
    - working_dir
    - env
    - retry_on_exit_codes
    - emit_event
    - include_output_in_event
    - stdout_max_bytes
    - stderr_max_bytes
