manifest_spec: ductile.plugin
manifest_version: 1
name: check_youtube
# Copy of plugins/switch (instance-specific manifest name). Keep in sync.
version: 0.1.0
protocol: 2
entrypoint: run.py
description: "Classify URL payloads to route YouTube vs web content."
commands:
  - name: handle
    type: write
    description: "Classify a URL as YouTube, web, or plain text and route it to the correct pipeline."
  - name: health
    type: read
    description: "Validate plugin configuration."
config_keys:
  required: [field, checks]
  optional: []
