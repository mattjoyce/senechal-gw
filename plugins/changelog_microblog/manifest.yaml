manifest_spec: ductile.plugin
manifest_version: 1
name: changelog_microblog
version: 0.1.0
protocol: 2
entrypoint: run.py
description: "Generate micro-blog changelog entries from recent commits."
commands:
  - name: handle
    type: write
    description: "Update CHANGELOG.md with a micro-blog entry."
    idempotent: false
    retry_safe: true
  - name: health
    type: read
    description: "Return health status."
    idempotent: true
    retry_safe: true
config_keys:
  required: []
  optional: [fabric_bin, fabric_pattern, patterns_path, author_name, author_email]
