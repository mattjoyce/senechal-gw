manifest_spec: ductile.plugin
manifest_version: 1
name: discord_notify
version: 0.1.0
protocol: 2
entrypoint: run.py
description: "Send a message to a Discord channel via incoming webhook"
commands:
  - name: handle
    type: write
    description: "Post a message to Discord. Reads 'message' or 'content' from payload."
    input_schema:
      message: string
      content: string
      title: string
      username: string
  - name: poll
    type: write
    description: "Schedulable alias for handle. Post a message to Discord via a scheduled trigger."
    input_schema:
      message: string
      content: string
      title: string
      username: string
  - name: health
    type: read
    description: "Verify webhook URL is configured and reachable."
config_keys:
  required: []
  optional: [webhook_url, default_username, default_avatar_url, poll_message]
