manifest_spec: ductile.plugin
manifest_version: 1
name: fetch
version: 0.1.0
protocol: 2
entrypoint: run.py
description: "Fetch raw webpage content via HTTP GET and return HTML, plain text, or markdown"
concurrency_safe: false
commands:
  - name: handle
    type: write
    description: "Fetch the URL from the event payload and emit fetch.completed or fetch.failed."
    idempotent: true
    retry_safe: true
    input_schema:
      url: string
    values:
      consume:
        - payload.url
      emit:
        - event: fetch.completed
          values:
            - payload.url
            - payload.final_url
            - payload.status_code
            - payload.content_length
            - payload.output_format
            - payload.content
            - payload.markdown_tokens
        - event: fetch.failed
          values:
            - payload.url
            - payload.error
  - name: health
    type: read
    description: "Returns plugin health status."
    idempotent: true
    retry_safe: true
config_keys:
  required: []
  optional:
    - user_agent
    - timeout_seconds
    - follow_redirects
    - output_format  # html | text | markdown (markdown uses Accept: text/markdown with HTML fallback)
