manifest_spec: ductile.plugin
manifest_version: 1
name: switch
version: 0.1.0
protocol: 2
entrypoint: run.py
description: "Legacy payload classifier. Prefer pipeline if: conditions for new authoring."
commands:
  - name: handle
    type: write
    description: "Route an event to a new type based on configured field match rules."
    values:
      consume:
        - payload.*
      emit:
        - event: "<configured check emit>"
          values:
            - payload.*
  - name: health
    type: read
    description: "Validate plugin configuration."
config_keys:
  required: [field, checks]
  optional: []
