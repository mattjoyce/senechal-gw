manifest_spec: ductile.plugin
manifest_version: 1
name: file_handler
version: 0.1.0
protocol: 2
entrypoint: run.py
description: "Read and write local files with path restrictions"
commands:
  - name: poll
    type: write
    description: "No-op scheduled tick — file_handler is event-driven."
    idempotent: true
    retry_safe: true
  - name: handle
    type: write
    description: "Read or write a file from an authorised location. Set action to 'read' (requires file_path) or 'write' (requires content/result and output_path or output_dir)."
    idempotent: false
    retry_safe: false
    input_schema:
      action: string
      file_path: string
      content: string
      result: string
      output_path: string
      output_dir: string
    values:
      consume:
        - payload.action
        - payload.file_path
        - payload.content
        - payload.result
        - payload.output_path
        - payload.output_dir
        - payload.pattern
      emit:
        - event: file.read
          values:
            - payload.file_path
            - payload.filename
            - payload.content
            - payload.text
            - payload.size_bytes
            - payload.pattern
            - payload.output_dir
            - payload.output_path
        - event: file.written
          values:
            - payload.file_path
            - payload.size_bytes
  - name: health
    type: read
    description: "Validate configured read/write paths are accessible."
    idempotent: true
    retry_safe: true
config_keys:
  required: []
  optional: [allowed_read_paths, allowed_write_paths, default_output_dir]
