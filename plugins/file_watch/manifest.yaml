manifest_spec: ductile.plugin
manifest_version: 1
name: file_watch
version: 0.1.0
protocol: 2
entrypoint: run.py
description: "Scheduled single-file watcher that emits events on create/modify/delete transitions"
commands:
  - name: poll
    type: write
    description: "Scan configured file watches and emit events when tracked files change."
  - name: health
    type: read
    description: "Validate watch configuration and file path accessibility."
config_keys:
  required: []
  optional: [watches]
