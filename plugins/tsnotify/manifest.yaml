manifest_spec: ductile.plugin
manifest_version: 1
name: tsnotify
version: 0.1.0
protocol: 2
entrypoint: run.sh
description: >
  Fire-and-forget Tree Signal notifier. Posts one message
  (channel, payload, severity) to a Tree Signal /v1/messages
  endpoint. Telemetry must never fail the calling job: a
  delivery failure is logged and returns ok, never error.
commands:
  - name: notify
    type: write
    description: "Post one Tree Signal message; never fails the job."
    idempotent: false
    retry_safe: false        # a missed telemetry beat is not worth a retry
    input_schema:
      message: string
      severity: string
      channel: string
    output_schema:
      status: string
  - name: health
    type: read
    description: "Report Tree Signal /healthz reachability."
    idempotent: true
    retry_safe: true
config_keys:
  required: []
  optional: [ts_url, channel, severity]
