# COPY CHECKLIST:
# 1) Copy this folder to a new plugin directory (e.g. plugins/astro_refresh/).
# 2) Change `name:` below so it is unique across all plugin roots.
# 3) Keep `entrypoint: run.py` unless you intentionally swap runtimes.
# 4) Configure `plugins.<your_name>.config.command` in config.yaml.
# 5) Optionally set `event_type` per clone to avoid route ambiguity.
manifest_spec: ductile.plugin
manifest_version: 1
name: sys_exec
version: 0.1.0
protocol: 2
entrypoint: run.py
description: "Execute a configured shell command and emit result events."
commands:
  - name: poll
    type: write
    description: "Proactively execute the configured shell command (typically for scheduled checks)."
    values:
      consume: []
      emit:
        - event: sys_exec.completed
          values:
            - payload.command
            - payload.exit_code
            - payload.duration_ms
            - payload.timed_out
            - payload.stdout_truncated
            - payload.stderr_truncated
            - payload.working_dir
            - payload.executed_at
            - payload.stdout
            - payload.stderr
  - name: handle
    type: write
    description: "Execute a pre-configured shell command. The payload is exposed as DUCTILE_PAYLOAD_* environment variables."
    values:
      consume:
        - payload.*
      emit:
        - event: sys_exec.completed
          values:
            - payload.command
            - payload.exit_code
            - payload.duration_ms
            - payload.timed_out
            - payload.stdout_truncated
            - payload.stderr_truncated
            - payload.working_dir
            - payload.executed_at
            - payload.stdout
            - payload.stderr
  - name: health
    type: read
    description: "Validate command and runtime prerequisites."
config_keys:
  required: [command]
  optional:
    - event_type
    - timeout_seconds
    - working_dir
    - env
    - retry_on_exit_codes
    - emit_event
    - include_output_in_event
    - stdout_max_bytes
    - stderr_max_bytes
