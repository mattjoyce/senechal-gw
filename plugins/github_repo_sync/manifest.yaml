manifest_spec: ductile.plugin
manifest_version: 1
name: github_repo_sync
version: 0.1.0
protocol: 2
entrypoint: run.py
description: "Discover public GitHub repos updated recently and ensure local clones are up to date."
commands:
  - name: poll
    type: write
    description: "Discover public repos and clone/fetch them locally."
    idempotent: false
    retry_safe: false
  - name: handle
    type: write
    description: "Discover and sync public repos from a configured GitHub user account."
    idempotent: false
    retry_safe: false
  - name: health
    type: read
    description: "Return health status."
    idempotent: true
    retry_safe: true
config_keys:
  required: [owner]
  optional: [owner_type, clone_dir, lookback_days, include_private, include_forks, github_token, github_token_env]
