# Ductile Configuration
# See docs/ARCHITECTURE.md §11 for full reference

service:
  name: ductile
  tick_interval: 60s           # Scheduler heartbeat
  log_level: info              # debug, info, warn, error
  log_format: json             # json
  dedupe_ttl: 24h              # Deduplication window
  job_log_retention: 168h      # 7 days

state:
  path: ./ductile.db          # SQLite database path (PID lock derived from this)

# API Server: HTTP endpoints for external triggers (Sprint 2)
api:
  enabled: true                # Enable/disable API server
  listen: "localhost:8080"     # Listen address
  auth:
    # Legacy single token (admin/full access):
    # api_key: ${API_KEY}
    #
    # Scoped tokens:
    tokens:
      - token: ${DUCTILE_TOKEN_ADMIN}
        scopes: ["*"]

plugin_roots:
  - ./plugins                  # Native in-repo plugin directory

plugins:
  echo:
    enabled: true
    schedule:
      every: 5m                # Supported: 5m, 15m, 30m, hourly, 2h, 6h, daily, weekly, monthly
      jitter: 30s              # Randomization to avoid thundering herd
    timeout: 30s
    max_attempts: 3
    circuit_breaker:
      threshold: 3             # Consecutive failures before blocking scheduler
      reset_after: 5m
    config:
      # Plugin-specific config goes here
      # Example: message: "Hello from echo plugin"

  jina-reader:
    enabled: true
    timeout: 30s
    max_attempts: 3
    circuit_breaker:
      threshold: 3
      reset_after: 5m
    config: {}

  file_handler:
    enabled: true
    timeout: 30s
    max_attempts: 1
    config:
      allowed_write_paths: /mnt/Projects/matt_joyce/site/src/content/summaries
      default_output_dir: /mnt/Projects/matt_joyce/site/src/content/summaries

  fabric:
    enabled: true
    timeout: 120s
    max_attempts: 1
    config:
      FABRIC_DEFAULT_MODEL: ${FABRIC_DEFAULT_MODEL}

  youtube_transcript:
    enabled: true
    timeout: 60s
    max_attempts: 2
    circuit_breaker:
      threshold: 3
      reset_after: 10m
    config:
      default_language: en
      request_timeout_seconds: 20

  youtube_playlist:
    enabled: true
    schedule:
      every: 30m
      jitter: 2m
    timeout: 30s
    max_attempts: 2
    circuit_breaker:
      threshold: 3
      reset_after: 10m
    config:
      playlist_url: "https://youtube.com/playlist?list=PL5Rty1LvKaJ5GI4nqEzvEPTdgobgODlkk&si=R01sIlTR-Rp4A--u"
      output_dir: /mnt/Projects/matt_joyce/site/src/content/summaries
      filename_template: "{video_id}.md"
      max_entries: 50
      max_emit: 5
      emit_existing_on_first_run: true
      transcript_language: en
      request_timeout_seconds: 15

routes:
  - from: youtube_playlist
    event_type: youtube.playlist_item
    to: youtube_transcript
  - from: youtube_transcript
    event_type: youtube.transcript
    to: fabric
  - from: fabric
    event_type: fabric.completed
    to: file_handler

# Webhooks: HTTP listener endpoints (not in MVP)
# webhooks:
#   github:
#     path: /webhook/github
#     secret: ${GITHUB_WEBHOOK_SECRET}
#     route_to: github_handler
