services:
  ductile:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: ductile-stress
    volumes:
      - ./config.stress.yaml:/app/config.yaml:ro
      - ../plugins:/app/plugins:ro
      - ductile-stress-data:/app/data
    environment:
      - DUCTILE_CONFIG_DIR=/app
    ports:
      - "18080:8080" # Using 18080 to avoid conflict

volumes:
  ductile-stress-data:
    driver: local
