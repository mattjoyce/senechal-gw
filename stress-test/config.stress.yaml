# Ductile Stress Test Configuration
service:
  name: ductile-stress
  tick_interval: 10s
  log_level: debug
  log_format: json

state:
  path: /app/data/stress.db

api:
  enabled: true
  listen: "0.0.0.0:8080"
  auth:
    tokens:
      - token: "bench-token-123"
        scopes: ["*"]

plugin_roots:
  - /app/plugins

plugins:
  stress:
    enabled: true
    config: {}
