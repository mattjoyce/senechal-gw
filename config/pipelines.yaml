# Example pipelines configuration
pipelines:
  - name: youtube-wisdom
    on: youtube.url.detected
    steps:
      - id: transcript
        uses: youtube_transcript
      - id: summarize
        uses: fabric
      - id: write
        uses: file_handler

  - name: web-summarize
    on: web.url.detected
    steps:
      - id: summarize
        uses: fabric
      - id: write
        uses: file_handler

  - name: github-repo-sync
    on: github_repo_sync.repo_discovered
    steps:
      - id: sync
        uses: git_repo_sync

  - name: github-repo-sync-notify
    on: github_repo_sync.completed
    steps:
      - id: notify
        uses: discord_notify
