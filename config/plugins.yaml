# Example plugins configuration
plugins:
  fabric:
    enabled: true
    timeout: 120s
    max_attempts: 2
    config:
      FABRIC_DEFAULT_PATTERN: "summarize"

  file_handler:
    enabled: true
    timeout: 30s
    max_attempts: 1
    config:
      allowed_read_paths: "~"
      allowed_write_paths: "~/.config/ductile/outputs"

  check_youtube:
    enabled: true
    timeout: 30s
    max_attempts: 1
    config:
      field: url
      checks:
        - contains: "youtu.be"
          emit: youtube.url.detected
        - contains: "youtube.com"
          emit: youtube.url.detected
        - startswith: "http"
          emit: web.url.detected
        - default: text.received

  jina-reader:
    enabled: true
    timeout: 30s
    max_attempts: 3
    circuit_breaker:
      threshold: 3
      reset_after: 5m
    config: {}

  sys_exec:
    enabled: true
    timeout: 30s
    max_attempts: 1
    config:
      command: "sh -c 'echo payload=$DUCTILE_PAYLOAD_MESSAGE'"

  folder_watch:
    enabled: true
    schedules:
      - every: 1m
    timeout: 30s
    max_attempts: 1
    config:
      watches:
        - id: summaries
          root: "~/projects/content"
          event_type: summaries.changed
          recursive: true
          include_globs: ["**/*.md"]
          emit_mode: aggregate
          emit_initial: false
          min_stable_age: 1s
