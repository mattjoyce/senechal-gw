pipelines:
  # Upstream pipeline that emits an event with role=admin in the payload
  # and claims that value as baggage for downstream pipelines
  - name: upstream_emits_admin_role
    on: test.upstream_trigger
    steps:
      - id: emit_admin
        uses: emit_event_with_role
        with:
          event_type: "test.downstream.check"
        baggage:
          role: payload.role

  # Downstream pipeline that fires when context.role == admin
  # This should fire because the upstream claimed role=admin
  - name: downstream_for_admin
    on: test.downstream.check
    if:
      path: context.role
      op: eq
      value: admin
    steps:
      - uses: downstream_admin

  # Downstream pipeline that fires when context.role == guest
  # This should NOT fire because the upstream claimed role=admin
  - name: downstream_for_guest
    on: test.downstream.check
    if:
      path: context.role
      op: eq
      value: guest
    steps:
      - uses: downstream_guest

  # Root trigger with context.role predicate
  # This should NOT fire because root triggers have no upstream context
  - name: root_with_context_predicate
    on: test.no_context_trigger
    if:
      path: context.role
      op: exists
    steps:
      - uses: downstream_no_context
