pipelines:
  # Upstream pipeline emits an event with role in payload and claims that
  # value as durable baggage. Downstream pipelines triggered from the
  # emitted event see the claimed value as context.role.
  - name: upstream_emits_admin_role
    on: test.upstream_trigger
    steps:
      - id: emit_admin
        uses: emit_event_with_role
        baggage:
          role: payload.role

  # Fires when context.role == admin — should fire (upstream claimed admin).
  - name: downstream_for_admin
    on: test.downstream.check
    if:
      path: context.role
      op: eq
      value: admin
    steps:
      - uses: downstream_admin

  # Fires when context.role == guest — should NOT fire (upstream claimed admin).
  - name: downstream_for_guest
    on: test.downstream.check
    if:
      path: context.role
      op: eq
      value: guest
    steps:
      - uses: downstream_guest

  # Root trigger with context.role exists predicate. Should NOT fire —
  # root triggers via the API have no upstream context to consult.
  - name: root_with_context_predicate
    on: test.no_context_trigger
    if:
      path: context.role
      op: exists
    steps:
      - uses: downstream_no_context
