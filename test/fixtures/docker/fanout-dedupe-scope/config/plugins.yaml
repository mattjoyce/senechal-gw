plugins:
  # Emits ONE work.ready event. Two consumer pipelines below both
  # subscribe to it — a single source event fanning out to two distinct
  # targets.
  emitter:
    uses: emit_event
    enabled: true
    config:
      event_type: "work.ready"

  # Two distinct fan-out targets. Pre-C-FRO-16 the sibling jobs inherited
  # the source event's dedupe key unscoped by target, so the second one
  # was silently dropped as a duplicate (the ductile-7m4 collapse other
  # fixtures deliberately work around with one starter per consumer).
  branch_a:
    uses: echo
    enabled: true
    config:
      message: "branch a ran"

  branch_b:
    uses: echo
    enabled: true
    config:
      message: "branch b ran"
