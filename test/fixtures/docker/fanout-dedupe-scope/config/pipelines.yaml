pipelines:
  # One starter, emits a single work.ready event.
  - name: start-fanout
    on: fanout.start
    steps:
      - id: emit
        uses: emitter

  # TWO consumers of the SAME source event — deliberate multi-consumer
  # fan-out (the opposite of the "one starter per consumer" workaround in
  # pipeline-level-if). Pre-C-FRO-16 these collapsed to a single job
  # because both inherited the source event's dedupe key with no target
  # scoping. Post-fix the dedupe identity is (plugin, command, key) so
  # both distinct branches run.
  - name: consume-a
    on: work.ready
    steps:
      - id: run
        uses: branch_a

  - name: consume-b
    on: work.ready
    steps:
      - id: run
        uses: branch_b
