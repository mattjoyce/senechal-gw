manifest_spec: ductile.plugin
manifest_version: 1
name: echo
version: 0.1.0
protocol: 2
entrypoint: run.sh
description: "A demonstration plugin that echoes input, emits events, and demonstrates protocol v2 state merging."
commands:
  - name: handle
    type: write
    description: "Echoes the input payload and emits an echo.event."
  - name: poll
    type: write
    description: "Emits echo.poll events and updates the internal last_run timestamp."
    idempotent: false
    retry_safe: false
    input_schema:
      message: string
    output_schema:
      status: string
  - name: health
    type: read
    description: "Returns the current health status and plugin version."
    idempotent: true
    retry_safe: true
config_keys:
  required: []
  optional: [message, mode]
