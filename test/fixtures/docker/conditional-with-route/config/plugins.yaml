plugins:
  content_processor:
    uses: sys_exec
    enabled: true
    config:
      working_dir: "./state"
      command:
        - python3
        - -c
        - |
          import json
          import os
          from pathlib import Path

          payload = {
              "content": os.environ.get("DUCTILE_PAYLOAD_CONTENT", ""),
              "message": os.environ.get("DUCTILE_PAYLOAD_MESSAGE", ""),
              "status": os.environ.get("DUCTILE_PAYLOAD_STATUS", ""),
              "subject": os.environ.get("DUCTILE_PAYLOAD_SUBJECT", ""),
          }
          Path("with-proof.json").write_text(json.dumps(payload, sort_keys=True), encoding="utf-8")
          print(json.dumps(payload, sort_keys=True))
      event_type: "content_processor.completed"

  event_echo:
    uses: echo
    enabled: true
    config:
      message: "conditional route sink"
