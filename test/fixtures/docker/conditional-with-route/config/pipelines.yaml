pipelines:
  - name: conditional-with-route
    on: conditional.with.request
    steps:
      - id: maybe_process
        uses: content_processor
        if:
          path: payload.run_processor
          op: eq
          value: true
        with:
          content: "branch true for {payload.subject}"
          message: "with transformed {payload.subject}"
          status: "{payload.status}"
      - id: finished
        uses: event_echo
