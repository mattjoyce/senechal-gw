pipelines:
  # Hook pipelines under test.
  #
  # plugin_a and plugin_b are triggered directly via POST /plugin/<name>/handle
  # so they run as ROOT jobs (no EventContextID). maybeFireHooks short-circuits
  # for pipeline steps, so wrapping them in pipelines would suppress the very
  # behaviour this fixture validates.

  # Scoped to plugin_a — fires only when plugin_a completes.
  - name: hook_scoped_to_a
    on-hook: job.completed
    from_plugin: plugin_a
    steps:
      - uses: hook_scoped_to_a

  # Scoped to plugin_b — fires only when plugin_b completes.
  - name: hook_scoped_to_b
    on-hook: job.completed
    from_plugin: plugin_b
    steps:
      - uses: hook_scoped_to_b

  # Regression: no from_plugin selector — fires for every job.completed.
  - name: hook_always
    on-hook: job.completed
    steps:
      - uses: hook_always
