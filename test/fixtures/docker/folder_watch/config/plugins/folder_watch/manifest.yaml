manifest_spec: ductile.plugin
manifest_version: 1
name: folder_watch
version: 0.1.0
protocol: 2
entrypoint: run.py
description: "Scheduled directory watcher that emits aggregate or per-file change events"
concurrency_safe: false
commands:
  - name: poll
    type: write
    description: "Scan configured directories and emit events for created/modified/deleted files."
  - name: health
    type: read
    description: "Validate folder watch roots and glob configuration."
fact_outputs:
  - when:
      command: poll
    from: state_updates
    fact_type: folder_watch.snapshot
    compatibility_view: mirror_object
config_keys:
  required: []
  optional: [watches]
