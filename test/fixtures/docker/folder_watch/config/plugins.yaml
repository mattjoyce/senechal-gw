plugins:
  folder_watch:
    enabled: true
    config:
      watches:
        - id: "test-watch"
          root: "/tmp/ductile-watch-test"
          include_globs: ["*.txt"]
          event_type: "file.found"
          emit_initial: true
    schedules:
      - command: poll
        every: 1s
  echo:
    enabled: true
