pipelines:
  # Starters — one per consumer to sidestep multi-consumer fan-out
  # dedupe (see beads ductile-7m4). Each starter emits one event.

  - name: starter-guarded
    on: starter.unused.guarded
    steps:
      - id: emit
        uses: emit_event_guarded

  - name: starter-unguarded
    on: starter.unused.unguarded
    steps:
      - id: emit
        uses: emit_event_unguarded

  # Consumer with a trigger-level predicate. Fires only when
  # payload.kind == workout.
  - name: pipeline-level-if-guarded
    on: pipeline.if.guarded
    if:
      path: payload.kind
      op: eq
      value: workout
    steps:
      - id: run
        uses: guarded_step

  # Sanity baseline — same trigger family, no predicate.
  - name: pipeline-level-if-unguarded
    on: pipeline.if.unguarded
    steps:
      - id: run
        uses: always_step

  # Hook pipeline scoped by predicate. Fires on job.completed only when
  # the payload's plugin field equals "guarded_step". Without the
  # predicate this would fire on every notify_on_complete:true job.
  - name: hook-scoped-notify
    on-hook: job.completed
    if:
      path: payload.plugin
      op: eq
      value: guarded_step
    steps:
      - id: notify
        uses: hook_step
