plugins:
  emit_event_guarded:
    uses: emit_event
    enabled: true
    config:
      event_type: "pipeline.if.guarded"

  emit_event_unguarded:
    uses: emit_event
    enabled: true
    config:
      event_type: "pipeline.if.unguarded"

  guarded_step:
    uses: echo
    enabled: true
    notify_on_complete: true
    config:
      message: "guarded step ran"

  always_step:
    uses: echo
    enabled: true
    notify_on_complete: true
    config:
      message: "always step ran"

  hook_step:
    uses: echo
    enabled: true
    config:
      message: "hook step ran"
